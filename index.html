<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savor &mdash; Global Bistro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f9fc;
      color: #1e293b;
      line-height: 1.6;
    }

    /* ---------- Hero ---------- */
    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      color: #fff;
      text-align: center;
      padding: 72px 24px 56px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,.25) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(244,63,94,.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 5.5vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      position: relative;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #818cf8, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      margin-top: 14px;
      font-size: 1.125rem;
      color: #94a3b8;
      max-width: 560px;
      margin-inline: auto;
      position: relative;
    }

    .hero .tagline {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,.1);
      padding: 8px 20px;
      border-radius: 999px;
      font-size: .875rem;
      color: #cbd5e1;
      position: relative;
    }

    /* ---------- Menu section ---------- */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 56px 24px 48px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .section-header h2 {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .section-header p {
      color: #64748b;
      margin-top: 6px;
      font-size: 1.05rem;
    }

    #menu-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }

    /* ---------- Card ---------- */
    .card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: #e2e8f0;
    }

    .card-body {
      padding: 20px 22px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .card-price {
      font-size: 1.15rem;
      font-weight: 700;
      color: #6366f1;
      white-space: nowrap;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
      background: #f1f5f9;
      color: #475569;
    }

    .tag-veg {
      background: #dcfce7;
      color: #166534;
    }

    .tag-nonveg {
      background: #fee2e2;
      color: #991b1b;
    }

    .card-desc {
      margin-top: 10px;
      color: #64748b;
      font-size: .92rem;
      flex: 1;
    }

    .card-footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .85rem;
      color: #94a3b8;
    }

    .add-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-weight: 600;
      font-size: .85rem;
      cursor: pointer;
      transition: opacity .2s;
    }

    .add-btn:hover {
      opacity: .85;
    }

    /* ---------- Footer ---------- */
    .page-footer {
      text-align: center;
      padding: 32px 24px;
      color: #94a3b8;
      font-size: .85rem;
      border-top: 1px solid #e2e8f0;
      margin-top: 16px;
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 640px) {
      .hero { padding: 52px 20px 44px; }
      .container { padding: 36px 16px 32px; }
      #menu-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="hero">
    <h1>Savor <span>Global Bistro</span></h1>
    <p>A curated journey through the world's most beloved kitchens — each dish tells a story.</p>
    <div class="tagline">&#127758; &nbsp;Authentic Flavours &middot; Fresh Ingredients &middot; Crafted with Love</div>
  </header>

  <main class="container">
    <div class="section-header">
      <h2>Our Menu</h2>
      <p>Handpicked dishes from six continents</p>
    </div>
    <div id="menu-container"></div>
  </main>

  <footer class="page-footer">
    <p>&copy; 2026 &mdash; Savor Global Bistro. Built with HTML, CSS &amp; JavaScript.</p>
  </footer>

  <script src="my-object.js"></script>
</body>
</html>
